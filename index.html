<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Controle Financeiro — Gisele Romano Tarot</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Financeiro Tarot" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#6741d9" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:#f5f4f8; --bg2:#ffffff; --bg3:#eeedf4;
  --purple:#6741d9; --purple2:#7c5ce8; --purple-lt:#ede9ff; --purple-xlt:#f5f3ff;
  --text:#1a1825; --text2:#4a4560; --text3:#8a85a0; --border:#d8d5e8;
  --ok:#2da44e; --ok-bg:#e6f4ea; --warn:#e67e22; --warn-bg:#fef3e2;
  --over:#c0392b; --over-bg:#fde8e6;
  --radius:14px; --radius-sm:8px;
  --shadow:0 2px 16px rgba(103,65,217,.08); --shadow-md:0 4px 24px rgba(103,65,217,.14);
  --footer-h:62px; --tr:.18s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Poppins",sans-serif;font-size:15px;min-height:100vh;
  padding-bottom:calc(var(--footer-h) + env(safe-area-inset-bottom,0px));overflow-x:hidden}

/* AUTH */
.auth-screen{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;padding:24px;z-index:9999}
.auth-screen.visible{display:flex}
.auth-box{background:var(--bg2);border-radius:var(--radius);padding:32px 28px;width:100%;max-width:400px;box-shadow:var(--shadow-md)}
.auth-ornament{font-size:10px;letter-spacing:6px;color:var(--purple);opacity:.6;text-align:center;margin-bottom:4px}
.auth-title{font-size:22px;font-weight:800;color:var(--text);text-align:center;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.auth-subtitle{font-size:12px;color:var(--text3);text-align:center;margin-bottom:28px}
.auth-tabs{display:flex;background:var(--bg3);border-radius:var(--radius-sm);padding:3px;margin-bottom:24px}
.auth-tab{flex:1;padding:8px;border:none;background:none;border-radius:6px;font-family:"Poppins",sans-serif;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;transition:all var(--tr)}
.auth-tab.active{background:var(--bg2);color:var(--purple);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.auth-field input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:"Poppins",sans-serif;font-size:14px;color:var(--text);background:var(--bg);transition:border-color var(--tr)}
.auth-field input:focus{outline:none;border-color:var(--purple);background:var(--bg2)}
.auth-btn{width:100%;padding:13px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius-sm);font-family:"Poppins",sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background var(--tr);margin-top:4px}
.auth-btn:hover{background:var(--purple2)}
.auth-btn:disabled{opacity:.6;cursor:not-allowed}
.auth-error{background:var(--over-bg);color:var(--over);border:1px solid #f7c1c1;border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;font-weight:500;margin-bottom:14px;display:none}
.auth-error.show{display:block}
.auth-success{background:var(--ok-bg);color:var(--ok);border:1px solid #b6dfc4;border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;font-weight:500;margin-bottom:14px;display:none;text-align:center}
.auth-success.show{display:block}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(245,244,248,.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:8888;gap:14px}
.loading-overlay.visible{display:flex}
.loading-spinner{width:44px;height:44px;border:4px solid var(--purple-lt);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text3);font-weight:500}

/* SYNC */
.sync-indicator{position:fixed;top:calc(10px + env(safe-area-inset-top,0px));right:14px;background:var(--bg2);border:1px solid var(--border);border-radius:50px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--text3);z-index:150;display:flex;align-items:center;gap:5px;opacity:0;transition:opacity .3s;pointer-events:none}
.sync-indicator.visible{opacity:1}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);flex-shrink:0}
.sync-dot.syncing{background:var(--warn);animation:pulse .8s infinite}
.sync-dot.error{background:var(--over)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* HEADER */
.app-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:calc(10px + env(safe-area-inset-top,0px)) 16px 10px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between}
.header-center{flex:1;text-align:center}
.header-ornament{font-size:9px;letter-spacing:5px;color:var(--purple);opacity:.6;line-height:1}
.app-title{font-size:clamp(13px,3.5vw,18px);font-weight:800;color:var(--text);letter-spacing:1px;text-transform:uppercase}
.app-subtitle{font-size:10px;color:var(--text3);font-weight:300}
.logout-btn{background:none;border:1px solid var(--border);color:var(--text3);border-radius:50px;padding:5px 12px;font-family:"Poppins",sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all var(--tr)}
.logout-btn:hover{border-color:var(--over);color:var(--over)}

/* TABS TOP */
.top-tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex}
.top-tab{flex:1;padding:12px 8px;border:none;background:none;font-family:"Poppins",sans-serif;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--tr)}
.top-tab.active{color:var(--purple);border-bottom-color:var(--purple)}

/* CONTAINER */
.page{display:none;padding:16px 14px 8px;max-width:900px;margin:0 auto}
.page.active{display:block}

/* METRICS */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.metric-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.metric-value{font-size:20px;font-weight:700;color:var(--text)}
.metric-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}

/* BARS */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{font-size:12px;color:var(--text2);width:150px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:7px;background:var(--bg3);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px}
.bar-val{font-size:11px;color:var(--text3);width:80px;text-align:right;white-space:nowrap}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:"Poppins",sans-serif;font-size:13px;color:var(--text);background:var(--bg);transition:border-color var(--tr)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--purple);background:var(--bg2)}
.btn-primary{padding:12px 20px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius-sm);font-family:"Poppins",sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background var(--tr);touch-action:manipulation}
.btn-primary:hover{background:var(--purple2)}
.btn-primary:active{transform:scale(.97)}
.form-error{color:var(--over);font-size:12px;margin-top:4px;display:none}
.form-success{color:var(--ok);font-size:12px;font-weight:600;display:none}

/* BADGE */
.badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:600}
.badge-pix{background:#e6f4ea;color:#1a6630}
.badge-credito{background:#e6f1fb;color:#0c447c}
.badge-parcelado{background:#fef3e2;color:#7b4a00}
.badge-instagram{background:#fde8f0;color:#7d1a3c}
.badge-threads{background:#ede9ff;color:#3c3489}
.badge-anuncio{background:#fde8e6;color:#7b1d17}
.badge-organico{background:#e1f5ee;color:#0f6e56}

/* HISTORY LIST */
.tx-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--bg3)}
.tx-row:last-child{border-bottom:none}
.tx-info{flex:1;min-width:0}
.tx-service{font-size:13px;font-weight:600;color:var(--text)}
.tx-client{font-size:11px;color:var(--purple);font-weight:500}
.tx-meta{font-size:11px;color:var(--text3);margin-top:2px}
.tx-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.tx-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.tx-value{font-size:14px;font-weight:700;color:var(--text)}
.tx-actions{display:flex;gap:6px}
.btn-remove{padding:4px 10px;font-size:11px;background:none;border:1px solid #f7c1c1;color:var(--over);border-radius:6px;cursor:pointer;font-family:"Poppins",sans-serif;transition:background var(--tr)}
.btn-remove:hover{background:var(--over-bg)}
.btn-edit{padding:4px 10px;font-size:11px;background:none;border:1px solid var(--border);color:var(--purple);border-radius:6px;cursor:pointer;font-family:"Poppins",sans-serif;transition:background var(--tr)}
.btn-edit:hover{background:var(--purple-lt)}

/* FILTERS */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filter-row select{flex:1;min-width:130px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:"Poppins",sans-serif;font-size:12px;color:var(--text);background:var(--bg)}
.btn-export{padding:8px 14px;background:var(--purple-lt);color:var(--purple);border:none;border-radius:var(--radius-sm);font-family:"Poppins",sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background var(--tr)}
.btn-export:hover{background:#d8d0f8}
.total-filtrado{font-size:12px;color:var(--text3);font-weight:500}

/* EMPTY */
.empty-state{text-align:center;padding:2rem;color:var(--text3);font-size:13px;font-style:italic}

/* FOOTER NAV */
.footer-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--footer-h) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:200;box-shadow:0 -4px 16px rgba(103,65,217,.08)}
.footer-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 4px;background:none;border:none;cursor:pointer;font-family:"Poppins",sans-serif;font-size:10px;font-weight:500;color:var(--text3);transition:all var(--tr);touch-action:manipulation;position:relative}
.footer-tab:hover{color:var(--purple);background:var(--purple-xlt)}
.footer-tab.active{color:var(--purple)}
.footer-tab.active::after{content:"";position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--purple);border-radius:0 0 3px 3px}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--footer-h) + 12px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:#fff;padding:9px 18px;border-radius:50px;font-size:12px;font-weight:500;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:700;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MODAL EDITAR */
.modal-overlay{position:fixed;inset:0;background:rgba(26,24,37,.55);z-index:2000;display:none;align-items:flex-end;justify-content:center;padding:0}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:24px 20px 32px;box-shadow:0 -8px 40px rgba(103,65,217,.18);animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:15px;font-weight:700;color:var(--text)}
.modal-close{background:none;border:none;font-size:22px;color:var(--text3);cursor:pointer;line-height:1;padding:2px 6px}
.modal-close:hover{color:var(--text)}
.modal-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.btn-secondary{padding:11px 18px;background:var(--bg3);color:var(--text2);border:none;border-radius:var(--radius-sm);font-family:"Poppins",sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background var(--tr)}
.btn-secondary:hover{background:var(--border)}

/* Parcelas inline — sempre visível mas dinâmico */
.parcel-section{display:none}
.parcel-section.show{display:flex}

.pgto-origem-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}.metric-grid{grid-template-columns:1fr 1fr}.pgto-origem-grid{grid-template-columns:1fr}}

/* PERIOD SELECTOR */
.period-bar{display:flex;gap:6px;margin-bottom:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:5px;box-shadow:var(--shadow)}
.period-btn{flex:1;padding:8px 4px;border:none;background:none;border-radius:var(--radius-sm);font-family:"Poppins",sans-serif;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:all var(--tr);text-align:center}
.period-btn.active{background:var(--purple);color:#fff;box-shadow:0 2px 8px rgba(103,65,217,.25)}
.period-btn:not(.active):hover{background:var(--purple-lt);color:var(--purple)}
</style>

<!-- AUTH -->
<div class="auth-screen" id="auth-screen">

/* ── DB ── */
async function loadEntries() {
  showSync('syncing','Carregando…');
  try {
    const{data,error}=await sb.from(TABLE).select('*').eq('user_id',currentUser.id).order('criado_em',{ascending:false});
    if(error) throw error;
    entries=data||[];
    showSync('ok','Atualizado');
  } catch(e){showSync('error','Erro de conexão');console.error(e)}
}

async function dbAdd(entry) {
  showSync('syncing','Salvando…');
  try {
    const{data,error}=await sb.from(TABLE).insert({...entry,user_id:currentUser.id}).select().single();
    if(error) throw error;
    entries.unshift(data);
    showSync('ok','Salvo!'); return data;
  } catch(e){showSync('error','Erro ao salvar');console.error(e);return null}
}

async function dbUpdate(id, patch) {
  showSync('syncing','Salvando…');
  try {
    const{data,error}=await sb.from(TABLE).update(patch).eq('id',id).select().single();
    if(error) throw error;
    const idx=entries.findIndex(e=>e.id===id);
    if(idx!==-1) entries[idx]={...entries[idx],...data};
    showSync('ok','Salvo!'); return data;
  } catch(e){showSync('error','Erro ao salvar');console.error(e);return null}
}

async function dbRemove(id) {
  showSync('syncing','Removendo…');
  try {
    const{error}=await sb.from(TABLE).delete().eq('id',id);
    if(error) throw error;
    entries=entries.filter(e=>e.id!==id);
    showSync('ok','Removido'); return true;
  } catch(e){showSync('error','Erro ao remover');console.error(e);return false}
}

function fmt(v){return'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}

let revenueChart = null;

function renderChart(filtered) {
  const canvas = document.getElementById('revenue-chart');
  const empty = document.getElementById('chart-empty');
  const label = document.getElementById('chart-period-label');

  if (!filtered.length) {
    canvas.style.display = 'none';
    empty.style.display = '';
    if (revenueChart) { revenueChart.destroy(); revenueChart = null; }
    return;
  }
  canvas.style.display = 'block';
  empty.style.display = 'none';

  // Agrupar por data
  const agg = {};
  filtered.forEach(e => {
    if (!e.data_atendimento) return;
    agg[e.data_atendimento] = (agg[e.data_atendimento] || 0) + Number(e.valor);
  });

  // Gerar range de datas
  const now = new Date();
  const today = now.toISOString().slice(0, 10);
  let dates = [];

  if (currentPeriod === 'hoje') {
    dates = [today];
    label.textContent = 'hoje';
  } else if (currentPeriod === '7d') {
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now); d.setDate(d.getDate() - i);
      dates.push(d.toISOString().slice(0, 10));
    }
    label.textContent = 'últimos 7 dias';
  } else if (currentPeriod === '30d') {
    for (let i = 29; i >= 0; i--) {
      const d = new Date(now); d.setDate(d.getDate() - i);
      dates.push(d.toISOString().slice(0, 10));
    }
    label.textContent = 'últimos 30 dias';
  } else if (currentPeriod === 'mes') {
    const ano = now.getFullYear(), mes = now.getMonth();
    const dim = new Date(ano, mes + 1, 0).getDate();
    for (let i = 1; i <= dim; i++) {
      dates.push(`${ano}-${String(mes+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`);
    }
    label.textContent = now.toLocaleString('pt-BR',{month:'long',year:'numeric'});
  } else {
    // tudo — agrupar por mês
    const magg = {};
    filtered.forEach(e => {
      if (!e.data_atendimento) return;
      const m = e.data_atendimento.slice(0, 7);
      magg[m] = (magg[m] || 0) + Number(e.valor);
    });
    const mkeys = Object.keys(magg).sort();
    const mlabels = mkeys.map(m => {
      const [y, mo] = m.split('-');
      return new Date(y, mo-1).toLocaleString('pt-BR',{month:'short',year:'2-digit'});
    });
    const mvals = mkeys.map(k => magg[k]);
    label.textContent = 'todo o período';
    drawChart(canvas, mlabels, mvals);
    return;
  }

  const labels = dates.map(d => {
    const [,, day] = d.split('-');
    return currentPeriod === 'mes' ? day : d.slice(5).replace('-','/');
  });
  const values = dates.map(d => agg[d] || 0);
  drawChart(canvas, labels, values);
}

function drawChart(canvas, labels, values) {
  if (revenueChart) { revenueChart.destroy(); revenueChart = null; }
  const ctx = canvas.getContext('2d');
  const purple = '#6741d9';
  const purpleLt = 'rgba(103,65,217,0.10)';

  revenueChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: purple,
        backgroundColor: purpleLt,
        borderWidth: 2,
        pointBackgroundColor: purple,
        pointRadius: values.length <= 15 ? 3 : 1,
        pointHoverRadius: 5,
        fill: true,
        tension: 0.35
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => 'R$ ' + ctx.parsed.y.toLocaleString('pt-BR',{minimumFractionDigits:2})
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            font: { family: 'Poppins', size: 10 },
            color: '#8a85a0',
            maxRotation: 0,
            maxTicksLimit: values.length > 20 ? 8 : values.length > 10 ? 10 : values.length
          }
        },
        y: {
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: {
            font: { family: 'Poppins', size: 10 },
            color: '#8a85a0',
            callback: v => 'R$' + (v >= 1000 ? (v/1000).toFixed(1)+'k' : v)
          },
          beginAtZero: true
        }
      }
    }
  });
}

let currentPeriod = 'mes';

const PERIOD_LABEL = {hoje:'Hoje','7d':'Últ. 7 dias','30d':'Últ. 30 dias',mes:'Este mês',tudo:'Tudo'};

function setPeriod(p){
  currentPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  const map = {hoje:0,'7d':1,'30d':2,mes:3,tudo:4};
  document.querySelectorAll('.period-btn')[map[p]].classList.add('active');
  renderPainel();
}

function filterByPeriod(list){
  const now = new Date();
  const today = now.toISOString().slice(0,10);
  if(currentPeriod==='hoje') return list.filter(e=>e.data_atendimento===today);
  if(currentPeriod==='7d'){
    const d=new Date(now); d.setDate(d.getDate()-6);
    const from=d.toISOString().slice(0,10);
    return list.filter(e=>e.data_atendimento>=from&&e.data_atendimento<=today);
  }
  if(currentPeriod==='30d'){
    const d=new Date(now); d.setDate(d.getDate()-29);
    const from=d.toISOString().slice(0,10);
    return list.filter(e=>e.data_atendimento>=from&&e.data_atendimento<=today);
  }
  if(currentPeriod==='mes'){
    const mes=String(now.getMonth()+1).padStart(2,'0'),ano=now.getFullYear();
    return list.filter(e=>e.data_atendimento&&e.data_atendimento.startsWith(`${ano}-${mes}`));
  }
  return list;
}

function renderPainel(){
  const filtered = filterByPeriod(entries);
  const total=filtered.reduce((s,e)=>s+Number(e.valor),0);
  const ticket=filtered.length?total/filtered.length:0;
  const pixTotal=filtered.filter(e=>e.pgto==='pix').reduce((s,e)=>s+Number(e.valor),0);
  const label=PERIOD_LABEL[currentPeriod];

  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Receita · ${label}</div><div class="metric-value">${fmt(total)}</div><div class="metric-sub">${filtered.length} atendimento${filtered.length!==1?'s':''}</div></div>
    <div class="metric"><div class="metric-label">Ticket médio</div><div class="metric-value">${fmt(ticket)}</div><div class="metric-sub">por atendimento</div></div>
    <div class="metric"><div class="metric-label">Receita PIX</div><div class="metric-value">${fmt(pixTotal)}</div><div class="metric-sub">${total>0?Math.round(pixTotal/total*100):0}% do total</div></div>
    <div class="metric"><div class="metric-label">Total geral</div><div class="metric-value">${fmt(entries.reduce((s,e)=>s+Number(e.valor),0))}</div><div class="metric-sub">${entries.length} atendimentos</div></div>
  `;
  renderChart(filtered);
  renderBars('bars-servico',filtered,'servico','#534AB7');
  renderBars('bars-pgto',filtered,'pgto','#1D9E75',PGTO_LABEL);
  renderBars('bars-origem',filtered,'origem','#D85A30',ORIG_LABEL);
}

function renderBars(elId,data,key,color,labelMap){
  const el=document.getElementById(elId);
  if(!data.length){el.innerHTML='<div class="empty-state" style="padding:1rem">Sem dados ainda</div>';return}
  const agg={};
  data.forEach(e=>{const k=e[key];agg[k]=(agg[k]||0)+Number(e.valor)});
  const sorted=Object.entries(agg).sort((a,b)=>b[1]-a[1]);
  const max=sorted[0][1];
  el.innerHTML=sorted.map(([k,v])=>`
    <div class="bar-row">
      <div class="bar-label">${(labelMap&&labelMap[k])||k}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/max*100)}%;background:${color}"></div></div>
      <div class="bar-val">${fmt(v)}</div>
    </div>`).join('');
}

/* ── HISTÓRICO ── */
function renderHistorico(){
  const fs=document.getElementById('fil-servico').value;
  const fp=document.getElementById('fil-pgto').value;
  const fo=document.getElementById('fil-origem').value;
  const fm=document.getElementById('fil-mes').value;
  const list=entries.filter(e=>
    (!fs||e.servico===fs)&&
    (!fp||e.pgto===fp)&&
    (!fo||e.origem===fo)&&
    (!fm||String(e.data_atendimento||'').includes('-'+fm+'-'))
  );
  const totalFilt=list.reduce((s,e)=>s+Number(e.valor),0);
  document.getElementById('total-filtrado').textContent=list.length?`${list.length} registro${list.length!==1?'s':''} · ${fmt(totalFilt)}`:'';
  const el=document.getElementById('historico-list');
  if(!list.length){el.innerHTML='<div class="empty-state">Nenhum registro encontrado.</div>';return}
  el.innerHTML=list.map(e=>{
    const d=e.data_atendimento?e.data_atendimento.slice(8)+'/'+e.data_atendimento.slice(5,7)+'/'+e.data_atendimento.slice(0,4):'—';
    const parc=e.parcelas?` (${e.parcelas})`:'';
    return`<div class="tx-row">
      <div class="tx-info">
        ${e.cliente?`<div class="tx-client">${e.cliente}</div>`:''}
        <div class="tx-service">${e.servico}</div>
        <div class="tx-meta">${d}${e.obs?' · '+e.obs:''}</div>
        <div class="tx-badges">
          <span class="badge ${PGTO_BADGE[e.pgto]}">${PGTO_LABEL[e.pgto]}${parc}</span>
          <span class="badge ${ORIG_BADGE[e.origem]}">${ORIG_LABEL[e.origem]}</span>
        </div>
      </div>
      <div class="tx-right">
        <div class="tx-value">${fmt(Number(e.valor))}</div>
        <div class="tx-actions">
          <button class="btn-edit" onclick="openEditModal(${e.id})">editar</button>
          <button class="btn-remove" onclick="removeEntry(${e.id})">remover</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function removeEntry(id){
  if(!confirm('Remover este lançamento?')) return;
  const ok=await dbRemove(id);
  if(ok){renderHistorico();renderPainel();toast('Lançamento removido')}
}

/* ── EXPORT ── */
function exportCSV(){
  const fs=document.getElementById('fil-servico').value;
  const fp=document.getElementById('fil-pgto').value;
  const fo=document.getElementById('fil-origem').value;
  const fm=document.getElementById('fil-mes').value;
  const list=entries.filter(e=>(!fs||e.servico===fs)&&(!fp||e.pgto===fp)&&(!fo||e.origem===fo)&&(!fm||String(e.data_atendimento||'').includes('-'+fm+'-')));
  const cols=['Data','Cliente','Serviço','Valor','Pagamento','Parcelas','Origem','Observações'];
  const rows=list.map(e=>[
    e.data_atendimento||'',e.cliente||'',e.servico,
    Number(e.valor).toFixed(2).replace('.',','),
    PGTO_LABEL[e.pgto],e.parcelas||'',ORIG_LABEL[e.origem],e.obs||''
  ]);
  const csv=[cols,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download='financeiro-tarot-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();URL.revokeObjectURL(url);
}

/* ── INIT ── */
(async function init(){
  if(typeof supabase==='undefined'){alert('Erro: Supabase não carregou. Verifique a conexão.');return}
  sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON,{auth:{persistSession:true,autoRefreshToken:true}});
  sb.auth.onAuthStateChange((event,session)=>{
    if(event==='SIGNED_OUT'||event==='USER_DELETED'){appStarted=false;currentUser=null;entries=[];document.getElementById('auth-screen').classList.add('visible')}
  });
  try{
    const{data}=await sb.auth.getSession();
    if(data?.session?.user) await enterApp(data.session.user);
    else document.getElementById('auth-screen').classList.add('visible');
  }catch(e){console.warn(e);document.getElementById('auth-screen').classList.add('visible')}
})();
</script>
